<!DOCTYPE html>
<html>
<head>
  <title>MCN Discover</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .header {
      position: sticky;
      top: 0;
      background: #1c2541;
      padding: 15px;
      text-align: center;
      z-index: 1000;
    }

    .header h2 {
      margin: 0;
      color: #5bc0be;
      font-size: 18px;
    }

    .container {
      padding: 10px;
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: #1c2541;
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%;
      height: 170px;
      object-fit: cover;
    }

    .content {
      padding: 10px;
    }

    .tag {
      font-size: 10px;
      background: #5bc0be;
      color: #000;
      padding: 3px 6px;
      border-radius: 5px;
      display: inline-block;
      margin-bottom: 6px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      color: #5bc0be;
    }

    .text {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 6px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      opacity: 0.7;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #1c2541;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      border-top: 1px solid #333;
    }

    .nav-btn {
      color: white;
      font-size: 12px;
      text-align: center;
      cursor: pointer;
    }

    .nav-btn.active {
      color: #5bc0be;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>📰 MCN DISCOVER</h2>
</div>

<div class="container" id="feed">
  <div class="loading">Loading feed...</div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <div class="nav-btn" onclick="location.href='messages.html'">💬 Chat</div>
  <div class="nav-btn active">📰 Discover</div>
  <div class="nav-btn" onclick="location.href='dashboard.html'">🏠 Home</div>
</div>

<script>
async function loadFeed() {
  try {
    const res = await fetch("https://mxm-backend.onrender.com/blog/list");
    const data = await res.json();

    const container = document.getElementById("feed");
    container.innerHTML = "";

    data.forEach(post => {

      fetch(`https://mxm-backend.onrender.com/blog/view/${post.id}`, {
        method: "POST"
      });

      container.innerHTML += `
        <div class="card" onclick="openPost('${post.id}')">

          ${post.image ? `<img src="${post.image}">` : ""}

          <div class="content">
            <div class="tag">DISCOVER</div>

            <div class="title">${post.title}</div>

            <div class="text">
              ${(post.content || "").substring(0, 120)}...
            </div>
          </div>

        </div>
      `;
    });

  } catch (e) {
    document.getElementById("feed").innerHTML =
      "<p style='text-align:center'>Failed to load feed</p>";
  }
}

function openPost(id){
  window.location.href = "post.html?id=" + id;
}

loadFeed();
</script>

</body>
</html>
