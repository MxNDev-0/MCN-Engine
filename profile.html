<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1c2541;
      padding: 10px;
    }

    .icon-btn {
      background: #5bc0be;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* 🔥 DROPDOWN MENU */
    #dropdownMenu {
      display: none;
      padding: 10px;
      background: #1c2541;
      margin: 10px;
      border-radius: 10px;
    }

    /* 🔥 MONITOR */
    .monitor {
      background: #000;
      color: #0f0;
      height: 120px;
      overflow-y: auto;
      font-family: monospace;
      padding: 10px;
      border-radius: 12px;
      margin: 10px;
    }

    .profile-header {
      display: flex;
      align-items: center;
      background: #1c2541;
      margin: 10px;
      padding: 10px;
      border-radius: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #5bc0be;
    }

    .username {
      margin-left: 10px;
      color: #5bc0be;
      font-weight: bold;
    }

    .card {
      background: #1c2541;
      margin: 10px;
      padding: 10px;
      border-radius: 12px;
    }

    .popup {
      display: none;
      position: fixed;
      top: 20%;
      left: 10%;
      right: 10%;
      background: #1c2541;
      padding: 12px;
      border-radius: 12px;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <button class="icon-btn" onclick="location.href='dashboard.html'">Back</button>
  <h3>Profile</h3>
  <button class="icon-btn" onclick="toggleMenu()">☰</button>
</div>

<!-- 🔥 DROPDOWN MENU -->
<div id="dropdownMenu">
  <h4 id="usernameDisplay">Loading...</h4>

  <input id="usernameInput" placeholder="New username">
  <button onclick="updateUsername()">Save Username</button>

  <button onclick="resetPassword()">Reset Password</button>

  <hr>

  <button onclick="openRequests()">👥 Requests</button>
  <button onclick="openFriends()">👤 Friends</button>
</div>

<!-- 🔥 MONITOR (MOVED TO TOP) -->
<div id="monitor" class="monitor">
  [SYSTEM] Profile monitor started...
</div>

<!-- PROFILE HEADER -->
<div class="profile-header">
  <div class="avatar"></div>
  <div class="username">User Panel</div>
</div>

<!-- POPUPS -->
<div id="requestsPopup" class="popup">
  <h4>Friend Requests</h4>
  <div id="friendRequestsBox"></div>
  <button onclick="closePopup('requestsPopup')">Close</button>
</div>

<div id="friendsPopup" class="popup">
  <h4>Friends</h4>
  <div id="friendsBox"></div>
  <button onclick="closePopup('friendsPopup')">Close</button>
</div>

<!-- 🔥 NEW SECTION UNDER MONITOR -->
<div class="card">
  <h4>📊 Activity Overview</h4>
  <p>Ad Status: <b id="adStatus">No active ads</b></p>
  <p>Messages: <b id="msgCount">0</b></p>
</div>

<script type="module" src="profile.js"></script>

<script>

/* ================= MENU FIX ================= */
function toggleMenu() {
  const menu = document.getElementById("dropdownMenu");

  if (!menu) return;

  menu.style.display =
    menu.style.display === "block" ? "none" : "block";
}

/* CLOSE MENU OUTSIDE CLICK */
document.addEventListener("click", function (e) {
  const menu = document.getElementById("dropdownMenu");

  if (!menu) return;

  if (
    menu.style.display === "block" &&
    !menu.contains(e.target) &&
    !e.target.classList.contains("icon-btn")
  ) {
    menu.style.display = "none";
  }
});

/* ================= MONITOR LOG ================= */
function log(msg) {
  const box = document.getElementById("monitor");
  if (!box) return;

  const time = new Date().toLocaleTimeString();
  box.innerHTML += `<br>[${time}] ${msg}`;
  box.scrollTop = box.scrollHeight;
}

/* SAMPLE LOGS (YOU WILL CONNECT REAL DATA LATER) */
setTimeout(() => log("Welcome to your profile"), 1000);
setTimeout(() => log("System ready"), 2000);

/* ================= POPUPS ================= */
function openRequests(){
  document.getElementById("requestsPopup").style.display = "block";
}

function openFriends(){
  document.getElementById("friendsPopup").style.display = "block";
}

function closePopup(id){
  document.getElementById(id).style.display = "none";
}

</script>

</body>
</html>
