<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1c2541;
      padding: 10px;
    }

    .icon-btn {
      background: #5bc0be;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* 🔥 DROPDOWN MENU */
    .menu {
      display: none;
      background: #1c2541;
      padding: 10px;
    }

    .menu button, .menu input {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    /* 🔥 MONITOR */
    .monitor {
      background: #000;
      color: #00ff88;
      font-family: monospace;
      font-size: 12px;
      height: 120px;
      overflow-y: auto;
      padding: 8px;
      border-radius: 10px;
      margin: 10px;
      border: 1px solid #5bc0be;
    }

    /* 🔥 ACTIVITY PANEL */
    .card {
      background: #1c2541;
      margin: 10px;
      padding: 10px;
      border-radius: 12px;
    }

    .item {
      background: #0b132b;
      padding: 8px;
      border-radius: 8px;
      margin-top: 6px;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <button class="icon-btn" onclick="location.href='dashboard.html'">Back</button>
  <h3>Profile</h3>
  <button class="icon-btn" onclick="toggleMenu()">☰</button>
</div>

<!-- 🔥 HAMBURGER MENU -->
<div id="menu" class="menu">

  <b id="usernameDisplay">Loading...</b>

  <input id="usernameInput" placeholder="New username">
  <button onclick="updateUsername()">Save Username</button>

  <button onclick="resetPassword()">Reset Password</button>

  <hr>

  <button onclick="openRequests()">👥 Friend Requests</button>
  <button onclick="openFriends()">👤 Friends</button>

</div>

<!-- 🔥 MONITOR (TOP POSITION NOW) -->
<div class="monitor" id="profileMonitor">
  [SYSTEM] Profile monitor initialized...
</div>

<!-- 🔥 USER ACTIVITY PANEL -->
<div class="card">
  <h4>📊 Activity</h4>

  <div class="item">Ad Status: <b id="adStatus">No active ads</b></div>
  <div class="item">Remaining Time: <b id="adTime">--</b></div>
  <div class="item">Clicks: <b id="adClicks">0</b></div>
  <div class="item">Messages: <b id="msgCount">0</b></div>

</div>

<!-- POPUPS -->
<div id="requestsPopup" class="card" style="display:none;">
  <h4>Friend Requests</h4>
  <div id="friendRequestsBox"></div>
  <button onclick="closePopup('requestsPopup')">Close</button>
</div>

<div id="friendsPopup" class="card" style="display:none;">
  <h4>Friends</h4>
  <div id="friendsBox"></div>
  <button onclick="closePopup('friendsPopup')">Close</button>
</div>

<script type="module" src="profile.js"></script>

<script>
function toggleMenu(){
  const m = document.getElementById("menu");
  m.style.display = m.style.display === "block" ? "none" : "block";
}

function openRequests(){
  document.getElementById("requestsPopup").style.display = "block";
}

function openFriends(){
  document.getElementById("friendsPopup").style.display = "block";
}

function closePopup(id){
  document.getElementById(id).style.display = "none";
}
</script>

</body>
</html>
