<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MXM Crypto Empire</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background:#0b132b;
  color:white;
  text-align:center;
  padding:20px;
}

/* HERO */
.hero {
  max-width:520px;
  margin:auto;
  padding:20px;
  background:#1c2541;
  border-radius:14px;
}

.logo {
  font-size:20px;
  font-weight:bold;
  color:gold;
}

.hero h2 {
  font-size:28px;
  background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
  -webkit-background-clip: text;
  color: transparent;
}

.beta {
  background:gold;
  color:black;
  padding:3px 8px;
  border-radius:6px;
  font-size:12px;
}

/* INPUTS */
input {
  padding:10px;
  margin:6px;
  border-radius:6px;
  border:none;
  width:80%;
}

/* BUTTONS */
button {
  padding:12px;
  margin:8px;
  border-radius:6px;
  border:none;
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard { display:none; }

.card {
  background:#1c2541;
  padding:15px;
  margin:15px auto;
  border-radius:10px;
  max-width:520px;
}

/* POPUP */
.popup {
  display:none;
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  background:red;
  padding:15px;
  border-radius:8px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
}

.modal-content {
  background:#1c2541;
  padding:20px;
  border-radius:10px;
  max-width:400px;
  margin:10% auto;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="logo">💠 MXM</div>
  <span class="beta">BETA</span>
  <h2>MXM Crypto Empire</h2>
</div>

<!-- AUTH -->
<div id="auth">

<h3>Register</h3>
<input id="firstName" placeholder="First Name"><br>
<input id="lastName" placeholder="Last Name"><br>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<input id="confirmPassword" type="password" placeholder="Confirm Password"><br>

<button onclick="register()">Register</button>

<h3>Login</h3>
<input id="loginEmail" placeholder="Email"><br>
<input id="loginPassword" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Dashboard</h2>

<div class="card">
<h3>💰 Free Earning Platform</h3>
<button onclick="openModal('earn')">Start</button>
</div>

<div class="card">
<h3>💱 FixedFloat Exchange</h3>
<button onclick="openModal('float')">Open</button>
</div>

<div class="card">
<h3>📩 Contact Admin</h3>
<textarea id="message"></textarea><br>
<button onclick="sendMessage()">Send</button>
</div>

<div class="card">
<h3>🔒 Premium</h3>
<button onclick="premium()">Open</button>
</div>

<button onclick="logout()" style="background:red;color:white;">Logout</button>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3 id="modalTitle"></h3>
<p id="modalText"></p>
<button onclick="goLink()">Continue</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup"></div>

<script type="module" src="app.js"></script>

</body>
</html>
