<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI SaaS Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background:#0b132b;
  color:white;
  text-align:center;
  padding:20px;
}

.hero {
  background:#1c2541;
  padding:20px;
  border-radius:12px;
}

input, button {
  padding:10px;
  margin:6px;
  border-radius:6px;
  border:none;
}

.loginBtn { background:#2196f3; color:white; width:90%; }
.signupBtn { background:#00c853; color:black; width:90%; }

#dashboard { display:none; }

.card {
  background:#1c2541;
  padding:15px;
  margin:15px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="hero">
<h2>AI SaaS Business</h2>
<p>Secure AI crypto dashboard</p>
</div>

<div id="auth">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<label>
<input type="checkbox" id="rememberMe"> Remember Me
</label><br>

<!-- SIMPLE CAPTCHA -->
<p id="captchaQ"></p>
<input id="captchaA" placeholder="Answer captcha"><br>

<button class="loginBtn" onclick="login()">Login</button><br>
<button class="signupBtn" onclick="signup()">Sign Up</button>
</div>

<div id="dashboard">
<h2>Dashboard</h2>

<div class="card">
<button onclick="logout()">Logout</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  setPersistence,
  browserLocalPersistence,
  browserSessionPersistence,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAu8BaL9NV6NU_oKSy-pxh89TuVrovZzaE",
  authDomain: "ai-saas-business-ecfab.firebaseapp.com",
  projectId: "ai-saas-business-ecfab",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* CAPTCHA */
let num1 = Math.floor(Math.random()*10);
let num2 = Math.floor(Math.random()*10);
document.getElementById("captchaQ").innerText = `Solve: ${num1} + ${num2}`;

/* SIGNUP */
window.signup = async function () {
  let email = emailInput();
  let password = passInput();

  if(!checkCaptcha()) return;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Account created");
  } catch(e) {
    alert(e.message);
  }
};

/* LOGIN */
window.login = async function () {
  let email = emailInput();
  let password = passInput();

  if(!checkCaptcha()) return;

  try {
    const remember = document.getElementById("rememberMe").checked;

    await setPersistence(auth,
      remember ? browserLocalPersistence : browserSessionPersistence
    );

    await signInWithEmailAndPassword(auth, email, password);

  } catch(e) {
    alert("Login error: " + e.message);
  }
};

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {
  if(user){
    showDashboard();
    startInactivityTimer();
  } else {
    showAuth();
  }
});

/* LOGOUT */
window.logout = async function () {
  await signOut(auth);
};

/* UI SWITCH */
function showDashboard(){
  document.getElementById("auth").style.display="none";
  document.getElementById("dashboard").style.display="block";
}

function showAuth(){
  document.getElementById("auth").style.display="block";
  document.getElementById("dashboard").style.display="none";
}

/* HELPERS */
function emailInput(){
  return document.getElementById("email").value;
}
function passInput(){
  return document.getElementById("password").value;
}

/* CAPTCHA CHECK */
function checkCaptcha(){
  let ans = document.getElementById("captchaA").value;
  if(parseInt(ans) !== (num1+num2)){
    alert("Captcha incorrect");
    return false;
  }
  return true;
}

/* INACTIVITY LOGOUT */
let timeout;

function startInactivityTimer(){
  resetTimer();

  document.onmousemove = resetTimer;
  document.onkeypress = resetTimer;
  document.onclick = resetTimer;
}

function resetTimer(){
  clearTimeout(timeout);
  timeout = setTimeout(() => {
    alert("Session expired due to inactivity");
    logout();
  }, 10 * 60 * 1000); // 10 minutes
}
</script>

</body>
</html>
