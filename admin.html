<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine V15 - Admin Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="ui-theme.css">

  <style>
    body {
      background: #0b132b;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #0b132b;
      color: white;
      box-sizing: border-box;
    }

    textarea {
      min-height: 80px;
      resize: none;
    }

    .grid button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      background: #5bc0be;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    .danger {
      background: #ff4d4d !important;
      color: #fff;
    }

    .list-box {
      max-height: 220px;
      overflow-y: auto;
      padding: 5px;
      background: #0b132b;
      border-radius: 8px;
      margin-top: 10px;
    }

    .item {
      padding: 8px;
      margin-bottom: 6px;
      background: #16213e;
      border-radius: 8px;
      font-size: 14px;
    }

    /* 🔥 DEBUG BUTTON STYLE */
    .debug-btn {
      background: #f4d35e !important;
      color: #000;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="navbar">
  <h3>👑 MCN Engine V15 - Admin Control Panel</h3>
</div>

<div class="grid">

  <!-- WALLET -->
  <div class="card">
    <h3>💰 Wallet</h3>
    <input id="balanceInput" placeholder="Enter new balance">
    <button onclick="updateWallet()">Update Wallet</button>
  </div>

  <!-- EARNINGS -->
  <div class="card">
    <h3>➕ Earnings</h3>
    <input id="source" placeholder="Source">
    <input id="amount" placeholder="Amount">
    <button onclick="addEarning()">Add Earnings</button>
  </div>

  <!-- USERS -->
  <div class="card">
    <h3>👥 Users</h3>
    <div id="usersList" class="list-box"></div>
  </div>

  <!-- UPGRADES -->
  <div class="card">
    <h3>🚀 Upgrade Requests</h3>
    <div id="upgradeList" class="list-box"></div>
  </div>

  <!-- POSTS -->
  <div class="card">
    <h3>💬 Posts Control</h3>
    <button class="danger" onclick="clearAllPosts()">Clear All Posts</button>
    <div id="postsList" class="list-box"></div>
  </div>

  <!-- CREATE AD -->
  <div class="card">
    <h3>📢 Create Ad</h3>
    <input id="adTitle" placeholder="Ad Title">
    <textarea id="adText" placeholder="Ad Description"></textarea>
    <input id="adLink" placeholder="Ad Link">
    <button onclick="createAd()">Publish Ad</button>
  </div>

  <!-- AUTO BLOG -->
  <div class="card">
    <h3>🤖 Auto Blog Generator</h3>
    <input id="blogTopic" placeholder="Enter Topic (e.g Crypto)">
    <button onclick="generateBlog()">Generate Blog</button>
  </div>

  <!-- ANALYTICS -->
  <div class="card">
    <h3>📊 Analytics Dashboard</h3>

    <div class="item">Users: <b id="statUsers">0</b></div>
    <div class="item">Premium Users: <b id="statPremium">0</b></div>
    <div class="item">Blog Views: <b id="statViews">0</b></div>
    <div class="item">Ad Clicks: <b id="statClicks">0</b></div>
    <div class="item">Revenue: <b id="statRevenue">0</b></div>

    <button onclick="loadStats()">Refresh Stats</button>
  </div>

  <!-- 🔥 NEW: DEBUG PANEL -->
  <div class="card" id="debugCard" style="display:none;">
    <h3>🛠 Debug System</h3>
    <button id="debugBtn" class="debug-btn">Run Debug</button>
    <div id="debugOutput" class="list-box"></div>
  </div>

</div>

<script type="module" src="admin.js"></script>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔐 CONTROL DEBUG ACCESS */
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  const snap = await getDoc(doc(db, "users", user.uid));
  if (!snap.exists()) return;

  const data = snap.data();

  const debugCard = document.getElementById("debugCard");

  // ✅ Admin + Premium ONLY
  if (data.role === "admin" || data.isPremium === true) {
    debugCard.style.display = "block";
  }
});

/* 🛠 DEBUG FUNCTION */
document.getElementById("debugBtn").onclick = async () => {
  const output = document.getElementById("debugOutput");
  output.innerHTML = "Running debug...<br>";

  try {
    const user = auth.currentUser;

    output.innerHTML += "User: " + (user?.email || "None") + "<br>";

    const snap = await getDoc(doc(db, "users", user.uid));

    if (snap.exists()) {
      const data = snap.data();

      output.innerHTML += "Role: " + data.role + "<br>";
      output.innerHTML += "Premium: " + data.isPremium + "<br>";
    }

    output.innerHTML += "✅ Debug Complete";

  } catch (err) {
    output.innerHTML += "❌ Error: " + err.message;
  }
};
</script>

<script>

/* ================= CREATE AD ================= */
async function createAd() {
  const title = document.getElementById("adTitle").value;
  const text = document.getElementById("adText").value;
  const link = document.getElementById("adLink").value;

  if (!title || !text || !link) {
    alert("Fill all ad fields");
    return;
  }

  await fetch("https://mxm-backend.onrender.com/ads/create", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ title, text, link })
  });

  alert("Ad created successfully");
}

/* ================= AUTO BLOG ================= */
async function generateBlog() {
  const topic = document.getElementById("blogTopic").value;

  if (!topic) {
    alert("Enter a topic");
    return;
  }

  await fetch("https://mxm-backend.onrender.com/blog/auto-create", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ topic })
  });

  alert("Auto blog created");
}

/* ================= ANALYTICS ================= */
async function loadStats() {
  try {
    const res = await fetch("https://mxm-backend.onrender.com/admin/stats");
    const data = await res.json();

    document.getElementById("statUsers").innerText = data.users.total;
    document.getElementById("statPremium").innerText = data.users.premium;
    document.getElementById("statViews").innerText = data.blogs.views;
    document.getElementById("statClicks").innerText = data.ads.clicks;
    document.getElementById("statRevenue").innerText =
      (data.ads.estimatedRevenue || 0).toFixed(2);

  } catch (err) {
    console.log("Stats error:", err);
  }
}

loadStats();

</script>

</body>
</html>
