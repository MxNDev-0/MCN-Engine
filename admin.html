<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine V15 - Admin Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="ui-theme.css">

  <style>
    body {
      background: #0b132b;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #0b132b;
      color: white;
      box-sizing: border-box;
    }

    textarea {
      min-height: 80px;
      resize: none;
    }

    .grid button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      background: #5bc0be;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    .danger {
      background: #ff4d4d !important;
      color: #fff;
    }

    .list-box {
      max-height: 220px;
      overflow-y: auto;
      padding: 5px;
      background: #0b132b;
      border-radius: 8px;
      margin-top: 10px;
    }

    .item {
      padding: 8px;
      margin-bottom: 6px;
      background: #16213e;
      border-radius: 8px;
      font-size: 14px;
    }

    .debug-btn {
      background: #f4d35e !important;
      color: #000;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="navbar">
  <h3>👑 MCN Engine V15 - Admin Control Panel</h3>
</div>

<div class="grid">

  <!-- WALLET -->
  <div class="card">
    <h3>💰 Wallet</h3>
    <input id="balanceInput" placeholder="Enter new balance">
    <button onclick="updateWallet()">Update Wallet</button>
  </div>

  <!-- EARNINGS -->
  <div class="card">
    <h3>➕ Earnings</h3>
    <input id="source" placeholder="Source">
    <input id="amount" placeholder="Amount">
    <button onclick="addEarning()">Add Earnings</button>
  </div>

  <!-- USERS -->
  <div class="card">
    <h3>👥 Users</h3>
    <div id="usersList" class="list-box"></div>
  </div>

  <!-- UPGRADES -->
  <div class="card">
    <h3>🚀 Upgrade Requests</h3>
    <div id="upgradeList" class="list-box"></div>
  </div>

  <!-- POSTS -->
  <div class="card">
    <h3>💬 Posts Control</h3>
    <button class="danger" onclick="clearAllPosts()">Clear All Posts</button>
    <div id="postsList" class="list-box"></div>
  </div>

  <!-- CREATE AD -->
  <div class="card">
    <h3>📢 Create Ad</h3>
    <input id="adTitle" placeholder="Ad Title">
    <textarea id="adText" placeholder="Ad Description"></textarea>
    <input id="adLink" placeholder="Ad Link">
    <button onclick="createAd()">Publish Ad</button>
  </div>

  <!-- BLOG -->
  <div class="card">
    <h3>📝 Create Blog Post</h3>
    <input id="blogTitle" placeholder="Blog Title">
    <textarea id="blogContent" placeholder="Blog Content"></textarea>
    <input id="blogImage" placeholder="Image URL (optional)">
    <button onclick="createBlog()">Publish Blog</button>
  </div>

  <!-- ANALYTICS -->
  <div class="card">
    <h3>📊 Analytics Dashboard</h3>

    <div class="item">Users: <b id="statUsers">0</b></div>
    <div class="item">Premium Users: <b id="statPremium">0</b></div>
    <div class="item">Blog Views: <b id="statViews">0</b></div>
    <div class="item">Ad Clicks: <b id="statClicks">0</b></div>
    <div class="item">Revenue: <b id="statRevenue">0</b></div>

    <button onclick="loadStats()">Refresh Stats</button>
  </div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
