<!DOCTYPE html>
<html>
<head>
  <title>MCN DM System</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
      width: 100vw;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* LEFT USER PANEL */
    .users {
      width: 30%;
      max-width: 250px;
      background: #1c2541;
      overflow-y: auto;
      padding: 10px;
    }

    .user {
      padding: 10px;
      margin-bottom: 6px;
      background: #0b132b;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }

    .online {
      color: #5bc0be;
      font-size: 12px;
    }

    /* CHAT AREA */
    .chatBox {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      background: #1c2541;
      padding: 10px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      margin: 6px 0;
      padding: 8px;
      border-radius: 8px;
      max-width: 75%;
      word-wrap: break-word;
    }

    .msg.me {
      background: #5bc0be;
      color: black;
      align-self: flex-end;
    }

    .msg.other {
      background: #0b132b;
      align-self: flex-start;
      border: 1px solid #5bc0be33;
    }

    .input {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      background: #5bc0be;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .typing {
      font-size: 12px;
      color: #5bc0be;
      margin: 5px 0;
    }

    @media(max-width: 768px) {
      .users {
        display: none;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- USERS -->
  <div class="users" id="users"></div>

  <!-- CHAT -->
  <div class="chatBox">

    <h3>💬 MCN Messages</h3>

    <div class="chat" id="chat"></div>

    <div class="typing" id="typing"></div>

    <div class="input">
      <input id="msgInput" placeholder="Type message..." disabled>
      <button id="sendBtn" onclick="sendMsg()" disabled>Send</button>
    </div>

  </div>

</div>

<script type="module" src="messages.js"></script>

</body>
</html>
