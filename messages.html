<!DOCTYPE html>
<html>
<head>
  <title>MCN WhatsApp System</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* LEFT CHAT LIST */
    .sidebar {
      width: 30%;
      max-width: 300px;
      background: #1c2541;
      overflow-y: auto;
      border-right: 1px solid #222;
    }

    .chat-item {
      padding: 12px;
      border-bottom: 1px solid #111;
      cursor: pointer;
    }

    .chat-item:hover {
      background: #0b132b;
    }

    .chat-name {
      font-weight: bold;
    }

    .chat-last {
      font-size: 12px;
      opacity: 0.7;
    }

    /* RIGHT CHAT */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 10px;
      background: #1c2541;
      border-bottom: 1px solid #222;
    }

    .status {
      font-size: 12px;
      color: #5bc0be;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 70%;
      padding: 8px;
      margin: 5px 0;
      border-radius: 8px;
      word-wrap: break-word;
    }

    .me {
      background: #5bc0be;
      color: black;
      align-self: flex-end;
    }

    .other {
      background: #0b132b;
      border: 1px solid #5bc0be33;
      align-self: flex-start;
    }

    .input-box {
      display: flex;
      padding: 10px;
      gap: 8px;
      border-top: 1px solid #222;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      border: none;
      background: #5bc0be;
      border-radius: 8px;
      cursor: pointer;
    }

    .typing {
      font-size: 12px;
      color: #5bc0be;
      padding-left: 10px;
    }

    @media(max-width: 768px) {
      .sidebar {
        display: none;
      }
    }
  </style>
</head>

<body>

<div class="app">

  <!-- CHAT LIST -->
  <div class="sidebar" id="chatList"></div>

  <!-- CHAT AREA -->
  <div class="chat-area">

    <div class="header">
      <div id="chatName">Select chat</div>
      <div class="status" id="status"></div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="typing" id="typing"></div>

    <div class="input-box">
      <input id="msgInput" placeholder="Type message..." disabled>
      <button onclick="sendMsg()" id="sendBtn" disabled>Send</button>
    </div>

  </div>

</div>

<script type="module" src="message.js"></script>

</body>
</html>
