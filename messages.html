<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Messages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* LEFT CHAT LIST (WHATSAPP STYLE) */
    .sidebar {
      width: 30%;
      min-width: 250px;
      background: #1c2541;
      overflow-y: auto;
      border-right: 1px solid #333;
    }

    .chat-item {
      padding: 12px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .chat-item:hover {
      background: #111a33;
    }

    .chat-name {
      font-weight: bold;
    }

    .chat-last {
      font-size: 12px;
      opacity: 0.7;
    }

    /* CHAT WINDOW */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 10px;
      background: #1c2541;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      max-width: 70%;
      padding: 8px;
      margin: 5px 0;
      border-radius: 10px;
      font-size: 14px;
    }

    .me {
      background: #5bc0be;
      color: black;
      margin-left: auto;
    }

    .other {
      background: #0b132b;
      border: 1px solid #333;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #1c2541;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
    }

    button {
      padding: 10px 14px;
      background: #5bc0be;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .typing {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<!-- LEFT -->
<div class="sidebar" id="chatList"></div>

<!-- RIGHT -->
<div class="chat-area">

  <div class="header">
    <div id="activeUser">Select chat</div>
    <div class="typing" id="typing"></div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-box">
    <input id="msgInput" placeholder="Type message..." disabled>
    <button id="sendBtn" onclick="sendMsg()" disabled>Send</button>
  </div>

</div>

<script type="module" src="messages.js"></script>

</body>
</html>
