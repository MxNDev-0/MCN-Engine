<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    /* ================= NAVBAR ================= */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1c2541;
      padding: 10px;
      position: relative;
    }

    .nav-left button {
      width: 35px;
      height: 35px;
      font-size: 16px;
      border-radius: 6px;
    }

    .nav-title {
      font-size: 18px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ================= MENU ================= */
    .menu {
      display: none;
      flex-direction: column;
      position: absolute;
      top: 50px;
      left: 10px;
      width: 220px;
      background: #1c2541;
      border-radius: 10px;
      z-index: 9999;
      overflow: hidden;
    }

    .menu.active {
      display: flex;
    }

    .menu button {
      padding: 10px;
      text-align: left;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
    }

    .menu button:hover {
      background: #243256;
    }

    /* ================= NOTIFICATION ================= */
    .notif-wrapper {
      position: relative;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
    }

    .notif-badge {
      position: absolute;
      top: -5px;
      right: -8px;
      background: red;
      color: white;
      border-radius: 50%;
      padding: 2px 6px;
      font-size: 10px;
      display: none;
    }

    .notif-panel {
      position: absolute;
      top: 50px;
      right: 10px;
      width: 280px;
      max-height: 350px;
      overflow-y: auto;
      background: #1c2541;
      border-radius: 12px;
      display: none;
      z-index: 9999;
    }

    /* ================= CONTAINER ================= */
    .container {
      padding: 10px;
    }

    .card {
      background: #1c2541;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    /* ================= ADS ================= */
    .ads-container {
      overflow: hidden;
      position: relative;
    }

    .ads-slider {
      display: flex;
      transition: transform 0.5s ease;
    }

    .ad {
      min-width: 100%;
      text-align: center;
      padding: 15px;
      background: #0b132b;
      border-radius: 8px;
      font-size: 13px;
    }

    /* ================= DISCOVER ================= */
    #discoverBox .card {
      cursor: pointer;
    }

    #discoverBox img {
      width: 100%;
      border-radius: 8px;
    }

    /* ================= LANGUAGE ================= */
    .lang-select {
      background: #0b132b;
      color: white;
      border: 1px solid #5bc0be;
      border-radius: 6px;
      padding: 5px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">

  <div class="nav-left">
    <button onclick="toggleMenu()">☰</button>
  </div>

  <div class="nav-title" data-i18n="title">MCN Engine</div>

  <div class="nav-right">

    <!-- 🔔 NOTIFICATION -->
    <div class="notif-wrapper" onclick="toggleNotif()">
      🔔
      <span id="notifCount" class="notif-badge"></span>
    </div>

    <!-- 🌐 LANGUAGE -->
    <select class="lang-select" onchange="setLanguage(this.value)">
      <option value="en">EN</option>
      <option value="fr">FR</option>
      <option value="es">ES</option>
      <option value="ig">IG</option>
    </select>

  </div>
</div>

<!-- NOTIF PANEL -->
<div id="notifPanel" class="notif-panel"></div>

<!-- ================= MENU ================= -->
<div id="menu" class="menu">
  <button onclick="goHome()" data-i18n="home">🏠 Home</button>
  <button onclick="goProfile()" data-i18n="profile">👤 Profile</button>
  <button onclick="goMessages()" data-i18n="messages">💬 Messages</button>
  <button onclick="goAdSpace()" data-i18n="ads">🚀 Ads</button>
  <button onclick="goBlog()" data-i18n="blog">📰 Blog</button>
  <button onclick="goFaq()" data-i18n="faq">❓ FAQ</button>
  <button onclick="goAbout()" data-i18n="about">ℹ️ About</button>

  <button onclick="goAdmin()">🔐 Admin</button>

  <!-- ✅ RESTORED LOGOUT (LAST ITEM) -->
  <button onclick="logout()">🚪 Logout</button>
</div>

<!-- ================= MAIN ================= -->
<div class="container">

  <!-- ADS -->
  <div class="card">
    <h4>🔥 Sponsored Ads</h4>

    <div class="ads-container">
      <div class="ads-slider" id="adsSlider">
        <div class="ad">🚀 Promote your project here</div>
        <div class="ad">💰 Buy ad space on MCN Engine</div>
        <div class="ad">📢 Your ad here</div>
      </div>
    </div>
  </div>

  <!-- PRICES -->
  <div class="card">
    <h4>📊 Live Prices</h4>
    <div id="priceBox">Loading...</div>
  </div>

  <!-- DISCOVER -->
  <div class="card">
    <h4>📰 Discover Feed</h4>
    <div id="discoverBox">Loading feed...</div>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

<script>

/* ================= MENU TOGGLE FIX ================= */
window.toggleMenu = function () {
  document.getElementById("menu").classList.toggle("active");
};

/* ================= DISCOVER SAFE LOAD ================= */
async function loadDiscover() {
  const box = document.getElementById("discoverBox");

  try {
    const res = await fetch("https://mxm-backend.onrender.com/blog/list");
    if (!res.ok) throw new Error("404");

    const data = await res.json();

    box.innerHTML = "";

    data.forEach(post => {
      box.innerHTML += `
        <div class="card" onclick="openPost('${post.id}')">
          ${post.image ? `<img src="${post.image}">` : ""}
          <div>
            <b style="color:#5bc0be">${post.title}</b>
            <p style="font-size:12px;opacity:0.8">
              ${(post.content || "").substring(0,120)}...
            </p>
          </div>
        </div>
      `;
    });

  } catch (e) {
    box.innerHTML = "Discover unavailable";
  }
}

function openPost(id) {
  location.href = "blog/post.html?id=" + encodeURIComponent(id);
}

loadDiscover();

</script>

</body>
</html>
